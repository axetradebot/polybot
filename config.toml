[trading]
starting_bankroll = 274
max_bet_usd = 5.0
daily_loss_limit_usd = 30.0
consecutive_loss_pause = 5
pause_duration_minutes = 30

[signal]
min_delta_pct = 0.01
max_entry_price = 0.95
order_lifetime_ms = 8000

[signal.delta_pricing]
# [min_delta_pct, max_delta_pct, estimated_fair_value]
tiers = [
    [0.01, 0.03, 0.53],
    [0.03, 0.05, 0.58],
    [0.05, 0.10, 0.67],
    [0.10, 0.15, 0.78],
    [0.15, 0.20, 0.85],
    [0.20, 1.00, 0.90],
]

# Price sweep: start cheap, ramp up every ~1.3s until filled or window closes.
[signal.sweep]
start_s = 20            # begin sweeping at T-20
min_delta_pct = 0.01    # minimum BTC move % to trigger
start_offset = -0.06    # first bid: fair_value - 0.06 (near bottom of book)
end_offset = 0.15       # last bid: fair_value + 0.15 (guarantees fill)
steps = 15              # 15 price levels over ~20 seconds

[infrastructure]
binance_ws_url = "wss://stream.binance.com:9443/ws/btcusdt@trade"
polymarket_clob_url = "https://clob.polymarket.com"
polymarket_ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
polygon_rpc_url = "https://polygon-rpc.com"
polygon_chain_id = 137
signature_type = "GnosisSafe"
db_path = "./trades.db"
auto_redeem = true

[logging]
level = "info"
telegram_enabled = true
telegram_on_trade = true
telegram_on_error = true
telegram_daily_summary = true
