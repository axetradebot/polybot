[trading]
starting_bankroll = 500.0
max_bet_usd = 5.0
daily_loss_limit_usd = 500.0
consecutive_loss_pause = 5
pause_duration_minutes = 30

[signal]
min_delta_pct = 0.03
max_entry_price = 0.92
order_lifetime_ms = 8000

[signal.delta_pricing]
# [min_delta_pct, max_delta_pct, estimated_fair_value]
tiers = [
    [0.03, 0.06, 0.58],
    [0.06, 0.10, 0.67],
    [0.10, 0.15, 0.78],
    [0.15, 0.20, 0.85],
    [0.20, 1.00, 0.90],
]

# Tiered entry system: post orders earlier at better prices, tighten as window closes.
# Set enabled = false to fall back to single_entry behaviour.
[signal.entry_tiers]
enabled = true
# Bot wakes up this many seconds before close and begins the tier loop.
watch_start_s = 30

[[signal.entry_tiers.tiers]]
name = "early"
time_before_close_s = 20
price_offset = -0.10
min_delta_pct = 0.06

[[signal.entry_tiers.tiers]]
name = "mid"
time_before_close_s = 12
price_offset = -0.05
min_delta_pct = 0.05

[[signal.entry_tiers.tiers]]
name = "late"
time_before_close_s = 6
price_offset = -0.02
min_delta_pct = 0.03

# Used when entry_tiers.enabled = false
[signal.single_entry]
entry_time_before_close_s = 10

[infrastructure]
binance_ws_url = "wss://stream.binance.com:9443/ws/btcusdt@trade"
polymarket_clob_url = "https://clob.polymarket.com"
polymarket_ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
polygon_chain_id = 137
signature_type = "GnosisSafe"
db_path = "./trades.db"

[logging]
level = "info"
telegram_enabled = true
telegram_on_trade = true
telegram_on_error = true
telegram_daily_summary = true
