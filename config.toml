[general]
mode = "live"
log_level = "debug"

[telegram]
enabled = true
on_trade = true
on_error = true
daily_summary = true
verbose_skips = false
on_fill = true
on_settlement = true
on_order_placed = false
on_startup = true
on_watching = false
on_window_miss = false
on_heartbeat = false

[bankroll]
total = 671.21
max_concurrent_positions = 6
max_per_market = 2
bet_size_usd = 25.0
daily_loss_limit_usd = 200.0
consecutive_loss_pause = 10
pause_duration_minutes = 600
dynamic_sizing = true
min_bet_multiplier = 0.5
max_bet_multiplier = 2.0
baseline_signal = 0.10

[pricing]
strategy = "orderbook_aware"
undercut_offset = 0.01
tighten_step = 0.01
adjust_interval_ms = 700
min_entry_price = 0.30
entry_cutoff_s = 5
taker_delta_threshold = 0.0
breakeven_win_rate = 0.50
profit_margin_pct = 0.05

[scanner]
scan_interval_ms = 500
min_edge_score = 0.045
max_orders_per_cycle = 3
signal_weight_delta = 1.0
signal_weight_velocity = 0.1
signal_weight_volatility = 0.1
signal_weight_accel = 0.05
min_volatility_pct = 0.0
require_acceleration = false
min_signal_score = 0.04
min_ob_imbalance = 0.35

# ============================================================
# MARKET DEFINITIONS
#
# Each market has its own mode: "paper" | "live"
#   - Set mode = "live" to place real CLOB orders
#   - Set mode = "paper" to simulate fills
#   - Remove the mode line to inherit from [general].mode
#
# Set enabled = false to skip a market entirely (no scanning).
# ============================================================

[[markets]]
name = "BTC 5-min"
asset = "BTC"
mode = "live"
enabled = true
window_seconds = 300
slug_prefix = "btc-updown-5m"
resolution_source = "chainlink"
binance_symbol = "btcusdt"
chainlink_symbol = "btc/usd"
bybit_symbol = "BTCUSD"
entry_start_s = 30
entry_cutoff_s = 5
min_delta_pct = 0.04
max_entry_price = 0.50
early_entry_start_s = 0
undercut_offset = 0.01
tighten_step = 0.01
adjust_interval_ms = 500
delta_tiers = [
    [0.04, 0.45],
    [0.06, 0.48],
    [0.08, 0.50],
    [0.10, 0.50],
    [0.15, 0.50],
]

