[general]
mode = "live"
log_level = "debug"

[bankroll]
total = 239
max_concurrent_positions = 6
max_per_market = 2
bet_size_usd = 5.0
daily_loss_limit_usd = 50.0
consecutive_loss_pause = 5
pause_duration_minutes = 30

[pricing]
strategy = "orderbook_aware"
undercut_offset = 0.01
tighten_step = 0.01
adjust_interval_ms = 1000
min_entry_price = 0.55
entry_cutoff_s = 4
taker_delta_threshold = 0.0

[scanner]
scan_interval_ms = 1000
min_edge_score = 0.01
max_orders_per_cycle = 3

# ============================================================
# MARKET DEFINITIONS
#
# Each market has its own mode: "paper" | "live"
#   - Set mode = "live" to place real CLOB orders
#   - Set mode = "paper" to simulate fills
#   - Remove the mode line to inherit from [general].mode
#
# Set enabled = false to skip a market entirely (no scanning).
# ============================================================

[[markets]]
name = "BTC 5-min"1
asset = "BTC"
mode = "live"
enabled = true
window_seconds = 300
slug_prefix = "btc-updown-5m"
binance_symbol = "btcusdt"
chainlink_symbol = "btc/usd"
entry_start_s = 20
min_delta_pct = 0.06
max_entry_price = 0.90
delta_tiers = [
    [0.06, 0.80],
    [0.10, 0.83],
    [0.15, 0.86],
    [0.25, 0.90],
]

